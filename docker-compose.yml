services:
  todo-app:
    build: .
    container_name: todo-app
    restart: unless-stopped
    ports:
      - "3501:3000"
    environment:
      LOG_LEVEL: warn
      LINEAR_API_KEY: ${LINEAR_API_KEY}
      LINEAR_TEAM_ID: ${LINEAR_TEAM_ID}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_STAFF_ROLE_IDS: ${DISCORD_STAFF_ROLE_IDS}
      DISCORD_BOARD_ROLE_ID: ${DISCORD_BOARD_ROLE_ID}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_DEBUG_MODE: ${NEXT_PUBLIC_DEBUG_MODE:-false}
      NEXT_PUBLIC_DISCORD_STAFF_ROLE_IDS: ${NEXT_PUBLIC_DISCORD_STAFF_ROLE_IDS}
